  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold:    #c8963e;
      --gold-s:  rgba(200,150,62,0.12);
      --bg:      #faf9f6;          /* warm off-white */
      --surface: #ffffff;          /* pure white for cards */
      --border:  rgba(0,0,0,0.08); /* subtle dark border */
      --text:    #2b2b2b;          /* dark gray for text */
      --muted:   rgba(43,43,43,0.55); /* muted dark gray */
      --red:     #e74c3c;
      --green:   #2ecc71;
      --fd:      'Cormorant Garamond', Georgia, serif;
      --fb:      'Jost', system-ui, sans-serif;
    }
    body { background:var(--bg); color:var(--text); font-family:var(--fb); min-height:100vh; }
    body::before {
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.025;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:128px;
    }
    .wrap { position:relative; z-index:1; max-width:540px; margin:0 auto; padding:48px 20px 80px; }

    /* Header */
    .hd { text-align:center; margin-bottom:48px; }
    .hd-logo { font-family:var(--fd); font-size:1rem; letter-spacing:.35em; text-transform:uppercase; color:var(--gold); opacity:.85; display:block; margin-bottom:4px; }
    .hd-sub { font-size:.68rem; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); }

    /* Order badge */
    .order-badge {
      background:var(--gold-s); border:1px solid rgba(200,150,62,.3);
      border-radius:12px; padding:16px 20px;
      display:flex; align-items:center; gap:14px;
      margin-bottom:36px;
    }
    .order-badge-icon { font-size:1.8rem; flex-shrink:0; }
    .order-badge-ref { font-size:.68rem; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); margin-bottom:3px; }
    .order-badge-info { font-size:.95rem; font-weight:600; color:var(--text); }
    .order-badge-tpl {
      margin-left:auto; flex-shrink:0;
      font-size:.65rem; letter-spacing:.12em; text-transform:uppercase;
      color:var(--gold); background:var(--gold-s);
      border:1px solid rgba(200,150,62,.25);
      border-radius:50px; padding:4px 10px;
    }

    /* Section */
    .sec-label {
      font-size:.62rem; letter-spacing:.3em; text-transform:uppercase;
      color:var(--gold); opacity:.7;
      margin-bottom:16px;
      display:flex; align-items:center; gap:12px;
    }
    .sec-label::after { content:''; flex:1; height:1px; background:var(--border); }

    /* Field */
    .field { margin-bottom:14px; }
    .field label {
      display:flex; align-items:center; gap:6px;
      font-size:.65rem; letter-spacing:.15em; text-transform:uppercase;
      color:var(--muted); margin-bottom:7px;
    }
    .req { color:var(--gold); font-size:.7rem; }
    .field input, .field textarea, .field select {
      width:100%; background:var(--surface); border:1.5px solid var(--border);
      border-radius:10px; padding:12px 14px;
      color:var(--text); font-family:var(--fb); font-size:.9rem; font-weight:300;
      outline:none; transition:border-color .2s; appearance:none;
    }
    .field input::placeholder, .field textarea::placeholder { color:var(--muted); }
    .field input:focus, .field textarea:focus, .field select:focus { border-color:var(--gold); }
    .field textarea { min-height:100px; resize:vertical; }
    .field-hint { font-size:.7rem; color:var(--muted); margin-top:5px; line-height:1.5; }
    .field select {
      cursor:pointer;
      background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 6L11 1' stroke='rgba(0,0,0,0.4)' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
      background-repeat:no-repeat; background-position:right 14px center; padding-right:36px;
    }
    .field select option { background:#fff; color:var(--text); }

    /* File upload */
    .upload-zone {
      border:1.5px dashed var(--border); border-radius:10px;
      padding:24px 16px; text-align:center; cursor:pointer;
      transition:border-color .2s, background .2s;
      position:relative;
    }
    .upload-zone:hover { border-color:rgba(200,150,62,.4); background:var(--gold-s); }
    .upload-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; }
    .upload-zone-icon { font-size:1.8rem; margin-bottom:8px; display:block; }
    .upload-zone-text { font-size:.8rem; color:var(--muted); line-height:1.5; }
    .upload-zone-text strong { color:var(--gold); }
    .upload-previews { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .upload-thumb {
      width:72px; height:72px; border-radius:8px; object-fit:cover;
      border:1.5px solid var(--border); flex-shrink:0;
    }
    .upload-status { font-size:.72rem; margin-top:8px; color:var(--muted); }
    .upload-status.ok { color:var(--green); }
    .upload-status.err { color:var(--red); }

    /* Multi photos */
    .photos-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    /* Error */
    .err-msg {
      background:rgba(231,76,60,.1); border:1px solid rgba(231,76,60,.3);
      border-radius:8px; padding:12px 16px; font-size:.82rem; color:var(--red);
      margin-bottom:16px; display:none;
    }
    .err-msg.show { display:block; }

    /* Submit */
    .submit-wrap { margin-top:32px; }
    .submit-btn {
      width:100%; padding:16px 24px;
      background:var(--gold); border:none; border-radius:12px;
      font-family:var(--fb); font-size:.9rem; font-weight:600;
      color:#fff; cursor:pointer; letter-spacing:.04em;
      transition:all .2s; position:relative; overflow:hidden;
    }
    .submit-btn::after { content:''; position:absolute; inset:0; background:rgba(255,255,255,.12); opacity:0; transition:opacity .2s; }
    .submit-btn:hover::after { opacity:1; }
    .submit-btn:disabled { opacity:.5; cursor:not-allowed; }
    .submit-note { text-align:center; font-size:.72rem; color:var(--muted); margin-top:12px; line-height:1.6; }

    /* Success */
    #success { display:none; text-align:center; padding:60px 24px; animation:fadeUp .6s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .suc-icon { font-size:3rem; display:block; margin-bottom:20px; }
    .suc-title { font-family:var(--fd); font-size:2rem; font-style:italic; margin-bottom:12px; }
    .suc-text { font-size:.9rem; font-weight:300; color:var(--muted); line-height:1.75; max-width:340px; margin:0 auto; }

    /* Loader */
    .uploading-overlay {
      position:fixed; inset:0; background:rgba(12,11,9,.85);
      display:none; align-items:center; justify-content:center;
      z-index:100; flex-direction:column; gap:16px;
    }
    .uploading-overlay.show { display:flex; }
    .spinner { width:40px; height:40px; border:3px solid rgba(200,150,62,.2); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .uploading-label { font-size:.85rem; color:var(--muted); letter-spacing:.06em; }

    /* Animate in */
    .hd,.order-badge,.sec-label,.field,.submit-wrap { opacity:0; transform:translateY(12px); animation:fadeUp .5s ease forwards; }
    .order-badge  { animation-delay:.05s }
    .field:nth-child(1) { animation-delay:.1s }

    .field:nth-child(3) { animation-delay:.2s }
    .field:nth-child(4) { animation-delay:.25s }
    .field:nth-child(5) { animation-delay:.3s }
    .submit-wrap { animation-delay:.35s }
  </style>

/* ═══════════════════════════════════════════════════════
   UPLOAD vers Cloudinary via API serveur
═══════════════════════════════════════════════════════ */
const API = '';   // même domaine

async function uploadFile(file, onProgress) {
  const fd = new FormData();
  fd.append('file', file);

  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', `${API}/api/upload`);
    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable && onProgress) onProgress(Math.round(e.loaded / e.total * 100));
    };
    xhr.onload = () => {
      try {
        const data = JSON.parse(xhr.responseText);
        if (xhr.status >= 200 && xhr.status < 300) resolve(data.url);
        else reject(new Error(data.error || 'Upload échoué'));
      } catch { reject(new Error('Réponse invalide')); }
    };
    xhr.onerror = () => reject(new Error('Erreur réseau'));
    xhr.send(fd);
  });
}

    const secLabel = document.createElement('div');
    secLabel.className = 'sec-label';
    secLabel.textContent = section.title;
    container.appendChild(secLabel);

    section.fields.forEach(field => {
      const wrapper = document.createElement('div');
      wrapper.className = 'field';

      if (field.type === 'info') {
        wrapper.innerHTML = `
          <div style="background:var(--gold-s);border:1px solid rgba(200,150,62,.2);
            border-radius:10px;padding:14px 16px;font-size:.82rem;
            color:var(--muted);line-height:1.6;">
            ℹ️ ${field.content}
          </div>`;
        container.appendChild(wrapper);
        return;
      }

      const reqStar = field.required ? '<span class="req">*</span>' : '';
      const hint    = field.hint ? `<div class="field-hint">💡 ${field.hint}</div>` : '';

      if (field.type === 'image') {
        const val = formValues[field.key] || '';
        const previewHtml = val ? `<img src="${val}" class="upload-thumb" alt="">` : '';
        wrapper.innerHTML = `
          <label>${field.label} ${reqStar}</label>
          <div class="upload-zone" id="zone-${field.key}">
            <input type="file" accept="image/*" data-field="${field.key}"
              onchange="handleImageUpload(this, '${field.key}')">
            <span class="upload-zone-icon">📷</span>
            <div class="upload-zone-text">
              <strong>Clique pour choisir</strong> ou glisse ta photo<br>
              JPG, PNG — max 10MB
            </div>
            <div class="upload-previews" id="preview-${field.key}">${previewHtml}</div>
          </div>
          <div class="upload-status" id="status-${field.key}"></div>
          ${hint}`;

      } else if (field.type === 'textarea') {
        const val = formValues[field.key] || '';
        wrapper.innerHTML = `
          <label>${field.label} ${reqStar}</label>
          <textarea placeholder="${field.placeholder || ''}"
            oninput="formValues['${field.key}']=this.value"
            rows="4">${val}</textarea>${hint}`;

      } else if (field.type === 'url') {
        const val = formValues[field.key] || '';
        wrapper.innerHTML = `
          <label>${field.label} ${reqStar}</label>
          <input type="url" placeholder="${field.placeholder || ''}" value="${val}"
            oninput="formValues['${field.key}']=this.value">
          ${hint}`;

      } else {
        const val = formValues[field.key] || '';
        wrapper.innerHTML = `
          <label>${field.label} ${reqStar}</label>
          <input type="text" placeholder="${field.placeholder || ''}" value="${val}"
            oninput="formValues['${field.key}']=this.value">
          ${hint}`;
      }

      container.appendChild(wrapper);
    });
  });
}

/* ── Image upload ── */
async function handleImageUpload(input, fieldKey) {
  const file = input.files[0];
  if (!file) return;

  const statusEl  = document.getElementById(`status-${fieldKey}`);
  const previewEl = document.getElementById(`preview-${fieldKey}`);

  statusEl.textContent = '⏳ Upload en cours…';
  statusEl.className   = 'upload-status';

  try {
    const url = await uploadFile(file, (pct) => {
      statusEl.textContent = `⏳ ${pct}%…`;
    });

    uploadedUrls[fieldKey] = url;
    formValues[fieldKey]   = url;

    // Preview
    previewEl.innerHTML = '';
    const img = document.createElement('img');
    img.src = url; img.className = 'upload-thumb'; img.alt = '';
    previewEl.appendChild(img);

    statusEl.textContent = '✓ Photo uploadée';
    statusEl.className   = 'upload-status ok';

  } catch (err) {
    statusEl.textContent = '✕ ' + err.message;
    statusEl.className   = 'upload-status err';
  }
}

/* ═══════════════════════════════════════════════════════
   SUBMIT
═══════════════════════════════════════════════════════ */
document.getElementById('detail-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const errEl = document.getElementById('err-msg');
  errEl.classList.remove('show');

  // Check required fields
  const templateName = new URLSearchParams(location.search).get('t');
  const config       = TEMPLATE_CONFIGS[templateName];
  if (!config) return;

  const missing = [];
  config.sections.forEach(section => {
    section.fields.forEach(field => {
      if (field.required && !formValues[field.key]) {
        missing.push(field.label);
      }
    });
  });

  if (missing.length) {
    errEl.textContent = `Champs obligatoires manquants : ${missing.join(', ')}`;
    errEl.classList.add('show');
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Envoi en cours…';

  const ref = new URLSearchParams(location.search).get('ref') || '';
  const pubId = new URLSearchParams(location.search).get('pub') || '';
  const nameParam = new URLSearchParams(location.search).get('name') || '';

  let endpoint;
  if (ref) {
    endpoint = `${API}/api/orders/${ref}/details`;
  } else if (pubId) {
    endpoint = `${API}/api/publications/${pubId}/client-details`;
  } else {
    errEl.textContent = 'Lien invalide : aucune référence de commande ni identifiant de publication.';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Envoyer mes informations →';
    return;
  }

  try {
    const res = await fetch(endpoint, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ templateData: formValues, clientName: nameParam }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erreur serveur');

    document.getElementById('detail-form').style.display = 'none';
    document.getElementById('success').style.display     = 'block';

  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.add('show');
    btn.disabled     = false;
    btn.textContent  = 'Envoyer mes informations →';
  }
});

/* ═══════════════════════════════════════════════════════
   INIT — lit ?ref=EW-XXXX&t=template dans l'URL
═══════════════════════════════════════════════════════ */
(async function init() {
  const params = new URLSearchParams(location.search);
  const ref    = params.get('ref')  || '';
  const tpl    = params.get('t')    || '';
  const name   = params.get('name') || '';   // prénom destinataire pré-rempli

  document.getElementById('badge-info').textContent =
    name ? `Pour ${name}` : 'Personnalisation';

  if (!tpl) {
    document.getElementById('form-fields').innerHTML =
      '<p style="color:var(--muted);text-align:center;padding:60px 20px">Lien invalide. Contacte-nous sur WhatsApp.</p>';
    return;
  }

  // Fetch template defaults
  try {
    const res = await fetch(`${API}/api/templates/${tpl}`);
    if (res.ok) {
      const template = await res.json();
      if (template.defaultData) {
        Object.assign(formValues, template.defaultData);
      }
    }
  } catch (e) {
    console.warn("Could not load template defaults", e);
  }

  buildForm(tpl);
})();
</script>

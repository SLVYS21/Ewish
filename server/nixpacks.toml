# ================================================================
# Nixpacks — server (Coolify / Railway / etc.)
# On force l'installation des libs système dont Chromium (téléchargé
# par Puppeteer via postinstall) a besoin pour se lancer.
# Sans ça : "error while loading shared libraries: libnss3.so".
# Liste officielle : https://pptr.dev/troubleshooting
# ================================================================

[phases.setup]
aptPkgs = [
  # runtime Node (déjà géré par Nixpacks, mais explicite ne fait pas mal)
  "ca-certificates",
  "fonts-liberation",
  "wget",
  "xdg-utils",

  # ── Deps Chromium ─────────────────────────────────────────
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdbus-1-3",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libpango-1.0-0",
  "libpangocairo-1.0-0",
  "libcairo2",
  "libasound2",
  "libatspi2.0-0",
  "libx11-6",
  "libx11-xcb1",
  "libxcb1",
  "libxext6",
  "libxi6",
  "libxrender1",
  "libxtst6",
  "libglib2.0-0",
  "libgtk-3-0",
  "libexpat1",
  "libfontconfig1",
]

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forever</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:    #c0392b;
      --accent:     #e74c3c;
      --font:       'Playfair Display', Georgia, serif;
      --font-body:  'Lato', sans-serif;
      --fs-scale:   1;
      --text-color: #1a0a0a;
      --text-muted: #7a4a4a;
      --bg:         #fffaf9;
      --red:        #c0392b;
      --red-soft:   rgba(192,57,43,0.08);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text-color);
    }

    /* ── Grain subtil ── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 999;
      pointer-events: none; opacity: 0.018;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 150px;
    }

    /* ── Container principal ── */
    .container {
      position: fixed; inset: 0;
      visibility: hidden;
      overflow: hidden;
    }

    /* ── Sections (stacking absolu) ── */
    .scene {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 28px;
      text-align: center;
      pointer-events: none;  /* inactive scenes don't block clicks */
    }
    /* Only the visible scene captures clicks */
    #s4.clickable, #s5.clickable { pointer-events: all; }

    /* ══════════════════════════
       S1 — ACCUEIL
    ══════════════════════════ */
    .s1-hey {
      font-family: var(--font-body);
      font-size: calc(0.78rem * var(--fs-scale));
      font-weight: 300;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }
    .s1-name {
      font-size: calc(4.2rem * var(--fs-scale));
      font-weight: 400;
      font-style: italic;
      color: var(--text-color);
      line-height: 1;
      margin-bottom: 20px;
    }
    .s1-heart {
      font-size: 1.6rem;
      color: var(--red);
      opacity: 0;
      display: block;
      margin-bottom: 20px;
    }
    .s1-surprise {
      font-family: var(--font-body);
      font-size: calc(1rem * var(--fs-scale));
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      line-height: 1.6;
      max-width: 280px;
      opacity: 0;
    }
    .s1-divider {
      width: 0; height: 1px;
      background: var(--red);
      opacity: 0.3;
      margin: 18px auto;
    }

    /* ══════════════════════════
       S2 — DÉCOMPTE
    ══════════════════════════ */
    .s2 { background: var(--bg); }
    .s2-label {
      font-family: var(--font-body);
      font-size: calc(0.7rem * var(--fs-scale));
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }
    .s2-number {
      font-size: calc(8rem * var(--fs-scale));
      font-weight: 700;
      color: var(--red);
      line-height: 0.9;
      letter-spacing: -0.03em;
      position: relative;
    }
    .s2-unit {
      font-family: var(--font-body);
      font-size: calc(0.85rem * var(--fs-scale));
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 10px;
    }
    .s2-since {
      font-family: var(--font);
      font-style: italic;
      font-size: calc(0.95rem * var(--fs-scale));
      color: var(--text-muted);
      margin-top: 14px;
      opacity: 0;
    }
    .s2-ring {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      border: 1px solid rgba(192,57,43,0.12);
      pointer-events: none;
    }
    .s2-ring-2 {
      position: absolute;
      inset: -40px;
      border-radius: 50%;
      border: 1px solid rgba(192,57,43,0.06);
      pointer-events: none;
    }
    .s2-number-wrap {
      position: relative;
      display: inline-block;
    }

    /* ══════════════════════════
       S3 — PHOTOS
    ══════════════════════════ */
    .s3 { background: var(--bg); }
    .s3-photos {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .photo-slot {
      overflow: hidden;
      background: #f0e0e0;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      position: relative;
    }
    .photo-slot img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .photo-slot-1 {
      width: 100px; height: 130px;
      transform: rotate(-4deg);
      box-shadow: 0 8px 25px rgba(0,0,0,0.12);
    }
    .photo-slot-2 {
      width: 130px; height: 165px;
      transform: rotate(0deg);
      box-shadow: 0 12px 35px rgba(0,0,0,0.16);
    }
    .photo-slot-3 {
      width: 100px; height: 125px;
      transform: rotate(3.5deg);
      box-shadow: 0 8px 25px rgba(0,0,0,0.12);
    }
    .photo-placeholder-icon { font-size: 2rem; opacity: 0.3; color: var(--red); }
    .s3-caption {
      font-size: calc(1.55rem * var(--fs-scale));
      font-style: italic;
      color: var(--text-color);
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }
    .s3-subcaption {
      font-family: var(--font-body);
      font-size: calc(0.78rem * var(--fs-scale));
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* ══════════════════════════
       S4 — MESSAGE
    ══════════════════════════ */
    .s4 { background: var(--bg); }
    .s4-btn-wrap {
      margin-bottom: 32px;
    }
    .s4-reveal-btn {
      background: none;
      border: 1px solid rgba(192,57,43,0.3);
      border-radius: 50px;
      padding: 12px 32px;
      font-family: var(--font);
      font-style: italic;
      font-size: calc(1rem * var(--fs-scale));
      color: var(--red);
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.3s;
    }
    .s4-reveal-btn:hover {
      background: var(--red-soft);
      border-color: var(--red);
    }
    .s4-message-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 380px;
      max-height: 65vh;
    }
    .s4-message-wrap.visible { display: flex; }
    .s4-ornament {
      color: var(--red);
      font-size: 0.9rem;
      letter-spacing: 1em;
      opacity: 0.4;
      margin-bottom: 18px;
      flex-shrink: 0;
    }
    .s4-message-scroll {
      overflow-y: auto;
      width: 100%;
      padding: 0 8px 20px;
      /* hide scrollbar — show if needed */
      scrollbar-width: thin;
      scrollbar-color: rgba(192,57,43,0.2) transparent;
    }
    .s4-message-scroll::-webkit-scrollbar { width: 3px; }
    .s4-message-scroll::-webkit-scrollbar-track { background: transparent; }
    .s4-message-scroll::-webkit-scrollbar-thumb { background: rgba(192,57,43,0.2); border-radius: 2px; }
    .s4-message-text {
      font-size: calc(1.12rem * var(--fs-scale));
      font-style: italic;
      color: var(--text-color);
      line-height: 2;
      text-align: center;
      white-space: pre-wrap;
    }
    .s4-cursor {
      display: inline-block;
      width: 2px; height: 1.1em;
      background: var(--red);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .s4-from {
      font-family: var(--font-body);
      font-size: calc(0.75rem * var(--fs-scale));
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 18px;
      flex-shrink: 0;
    }

    /* ══════════════════════════
       S5 — OUTRO
    ══════════════════════════ */
    .s5-heart {
      font-size: 3rem;
      color: var(--red);
      margin-bottom: 18px;
      display: block;
    }
    .s5-line {
      font-family: var(--font-body);
      font-size: calc(0.85rem * var(--fs-scale));
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.2em;
      line-height: 2.5;
    }
    #replay {
      margin-top: 36px;
      font-family: var(--font);
      font-style: italic;
      font-size: calc(0.85rem * var(--fs-scale));
      color: var(--red);
      opacity: 0.45;
      background: none; border: none;
      cursor: pointer; letter-spacing: 0.04em;
      transition: opacity 0.3s;
    }
    #replay:hover { opacity: 0.9; }

    /* ══════════════════════════
       MUSIC PILL
    ══════════════════════════ */
    #music-pill {
      position: fixed; top: 16px; right: 16px;
      z-index: 9000; display: none;
    }
    .pill-btn {
      background: #fff;
      border: 1px solid rgba(192,57,43,0.2);
      border-radius: 50px;
      color: var(--red);
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px 7px 7px;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      box-shadow: 0 4px 16px rgba(192,57,43,0.12);
      transition: all 0.3s;
    }
    .pill-btn:hover { box-shadow: 0 6px 22px rgba(192,57,43,0.22); }
    .pill-cover-wrap {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--red-soft);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; overflow: hidden; flex-shrink: 0;
    }
    .pill-cover-wrap img { width:100%;height:100%;object-fit:cover;border-radius:50%;animation:spin 8s linear infinite paused; }
    .pill-cover-wrap img.playing { animation-play-state:running; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ══════════════════════════
       PROGRESS
    ══════════════════════════ */
    #progress-line {
      position: fixed; bottom: 0; left: 0;
      height: 2px; width: 0%;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
      z-index: 8000; opacity: 0;
      transition: width 0.8s linear;
    }

    /* ══════════════════════════
       HEARTS (petal rain)
    ══════════════════════════ */
    #hearts-canvas {
      position: fixed; inset: 0; z-index: 500;
      pointer-events: none; opacity: 0;
    }

    @media (max-width: 480px) {
      .s1-name { font-size: calc(3rem * var(--fs-scale)); }
      .s2-number { font-size: calc(6rem * var(--fs-scale)); }
      .photo-slot-1 { width: 80px; height: 105px; }
      .photo-slot-2 { width: 108px; height: 138px; }
      .photo-slot-3 { width: 80px; height: 100px; }
      .s3-caption { font-size: calc(1.3rem * var(--fs-scale)); }
    }

    /* ===== INTRO FOREVER RINGS ===== */
    #intro-overlay {
      position: fixed; inset: 0; z-index: 10000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(ellipse 90% 80% at 50% 42%, #fff9f9 0%, #fffbf5 52%, #fff5f0 100%);
      opacity: 1; transition: opacity 0.95s ease; overflow: hidden; pointer-events: none;
    }
    #intro-overlay.ib-dissolve { opacity: 0; }
    #intro-overlay::before {
      content: ''; position: absolute; width: 320px; height: 320px; border-radius: 50%;
      background: radial-gradient(circle, rgba(192,57,43,0.14) 0%, transparent 68%);
      animation: ibGlow 2.4s ease-in-out infinite alternate; pointer-events: none;
    }
    @keyframes ibGlow { from { transform:scale(0.88); opacity:0.5; } to { transform:scale(1.12); opacity:1; } }
    #bloom-svg { position:relative; z-index:1; width:min(300px,80vw); height:min(300px,80vw); overflow:visible; }
    .ib-ring-left  { fill:rgba(192,57,43,0.06); stroke:rgba(192,57,43,0.55); stroke-width:1.4; stroke-linecap:round; }
    .ib-ring-right { fill:rgba(192,57,43,0.06); stroke:rgba(192,57,43,0.55); stroke-width:1.4; stroke-linecap:round; }
    .ib-petal-out  { fill:rgba(192,57,43,0.05); stroke:rgba(192,57,43,0.35); stroke-width:1.0; stroke-linecap:round; stroke-linejoin:round; }
    .ib-infinity   { fill:none; stroke:rgba(180,40,30,0.45); stroke-width:1.1; stroke-linecap:round; }
    .ib-ring-outer { fill:none; stroke:rgba(192,57,43,0.28); stroke-width:0.85; stroke-dasharray:5 6; transform-box:fill-box; transform-origin:50% 50%; animation:ibRingSpin 30s linear infinite; }
    @keyframes ibRingSpin { to { transform:rotate(360deg); } }
    .ib-ring-mid    { fill:rgba(192,57,43,0.05); stroke:rgba(192,57,43,0.52); stroke-width:1.1; }
    .ib-ring-center { fill:rgba(192,57,43,0.55); stroke:rgba(192,57,43,0.9); stroke-width:1.5; }
    .ib-dot { fill:rgba(192,57,43,0.28); }
    .ib-draw { stroke-dasharray:2000; stroke-dashoffset:2000; }
    #ib-text { position:relative; z-index:1; margin-top:16px; text-align:center; opacity:0; transform:translateY(13px); transition:opacity 0.72s ease, transform 0.72s ease; }
    #ib-text.show { opacity:1; transform:translateY(0); }
    #ib-label { margin:0; font-family:'Playfair Display',serif; font-size:clamp(0.9rem,3.8vw,1.5rem); font-weight:400; font-style:italic; letter-spacing:0.1em; color:#8b2020; }
    #ib-line-svg { display:block; margin:9px auto 0; width:min(210px,58vw); height:18px; overflow:visible; }
    .ib-wavy-line { fill:none; stroke:rgba(192,57,43,0.75); stroke-width:2.2; stroke-linecap:round; stroke-dasharray:240; stroke-dashoffset:240; transition:stroke-dashoffset 0.82s cubic-bezier(0.4,0,0.2,1); }
    .ib-wavy-line.drawn { stroke-dashoffset:0; }
    #ib-burst { position:absolute; inset:0; pointer-events:none; z-index:2; }
    .ib-fp { position:absolute; top:50%; left:50%; font-size:clamp(1rem,2.8vw,1.35rem); line-height:1; opacity:0; margin:-14px; animation:ibFall 1.75s ease-out forwards; }
    @keyframes ibFall { 0%{opacity:0;transform:translate(0,0) rotate(0deg) scale(0.3);} 18%{opacity:1;} 70%{opacity:0.75;} 100%{opacity:0;transform:translate(var(--ib-tx),var(--ib-ty)) rotate(var(--ib-tr)) scale(1.1);} }

    /* ── Ambient floating sparkles ── */
    #ambient-layer { position: fixed; inset: 0; z-index: 3; pointer-events: none; display: none; }
    .amb-spark { position: absolute; overflow: visible; opacity: 0; }
    @keyframes ambFloat {
      0%, 100% { opacity: 0; transform: translateY(0) rotate(0deg); }
      20%, 80%  { opacity: 0.45; }
      50%       { opacity: 0.45; transform: translateY(-10px) rotate(22deg); }
    }
    @keyframes ambFloat2 {
      0%, 100% { opacity: 0; transform: translateY(0) rotate(-18deg); }
      20%, 80%  { opacity: 0.28; }
      50%       { opacity: 0.28; transform: translateY(-8px) rotate(6deg); }
    }
    .as1 { top:10%; left:5%;  width:14px; height:14px; animation: ambFloat  5.0s ease-in-out infinite 0.0s; }
    .as2 { top:16%; right:7%; width:10px; height:10px; animation: ambFloat  7.0s ease-in-out infinite 1.2s; }
    .as3 { bottom:20%; left:4%;  width:12px; height:12px; animation: ambFloat  4.8s ease-in-out infinite 2.5s; }
    .as4 { bottom:14%; right:5%; width: 9px; height: 9px; animation: ambFloat  6.2s ease-in-out infinite 0.8s; }
    .as5 { top:48%; left:3%;  width: 8px; height: 8px; animation: ambFloat  8.0s ease-in-out infinite 3.5s; }
    .as6 { top:58%; right:4%; width:11px; height:11px; animation: ambFloat2 5.5s ease-in-out infinite 1.8s; }
    /* ── Scene transition sparkle flash ── */
    #scene-flash {
      position: fixed; inset: 0; z-index: 2000;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0;
    }
    #scene-flash.active { animation: scFlash 0.6s ease-out forwards; }
    @keyframes scFlash { 0% { opacity:0; } 30% { opacity:1; } 100% { opacity:0; } }
    #scene-flash svg { width: 44px; height: 44px; }
  </style>
</head>
<body>
<!-- Ambient floating sparkles -->
<div id="ambient-layer" aria-hidden="true">
  <svg class="amb-spark as1" viewBox="-5 -5 10 10"><path d="M0,-4 L1,-1 L4,0 L1,1 L0,4 L-1,1 L-4,0 L-1,-1 Z" fill="#c9a84c"/></svg>
  <svg class="amb-spark as2" viewBox="-5 -5 10 10"><path d="M0,-3.5 L0.9,-0.9 L3.5,0 L0.9,0.9 L0,3.5 L-0.9,0.9 L-3.5,0 L-0.9,-0.9 Z" fill="#c9a84c"/></svg>
  <svg class="amb-spark as3" viewBox="-5 -5 10 10"><path d="M0,-4 L1,-1 L4,0 L1,1 L0,4 L-1,1 L-4,0 L-1,-1 Z" fill="#c9a84c"/></svg>
  <svg class="amb-spark as4" viewBox="-5 -5 10 10"><path d="M0,-3 L0.75,-0.75 L3,0 L0.75,0.75 L0,3 L-0.75,0.75 L-3,0 L-0.75,-0.75 Z" fill="#c9a84c"/></svg>
  <svg class="amb-spark as5" viewBox="-5 -5 10 10"><path d="M0,-3 L0.75,-0.75 L3,0 L0.75,0.75 L0,3 L-0.75,0.75 L-3,0 L-0.75,-0.75 Z" fill="#c9a84c"/></svg>
  <svg class="amb-spark as6" viewBox="-5 -5 10 10"><path d="M0,-3.5 L0.9,-0.9 L3.5,0 L0.9,0.9 L0,3.5 L-0.9,0.9 L-3.5,0 L-0.9,-0.9 Z" fill="#e05574"/></svg>
</div>
<!-- Scene transition sparkle flash -->
<div id="scene-flash" aria-hidden="true">
  <svg viewBox="-10 -10 20 20" overflow="visible">
    <path d="M0,-7 L1.8,-1.8 L7,0 L1.8,1.8 L0,7 L-1.8,1.8 L-7,0 L-1.8,-1.8 Z" fill="#c9a84c" opacity="0.8"/>
    <path d="M0,-4 L1,-1 L4,0 L1,1 L0,4 L-1,1 L-4,0 L-1,-1 Z" fill="white" opacity="0.9"/>
  </svg>
</div>

<div id="intro-overlay" aria-hidden="true">
  <svg id="bloom-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <circle class="ib-ring-outer" cx="200" cy="200" r="118"/>
    <!-- Two overlapping rings (wedding rings / infinity) -->
    <circle class="ib-draw ib-ring-left"  cx="172" cy="200" r="62"/>
    <circle class="ib-draw ib-ring-right" cx="228" cy="200" r="62"/>
    <!-- 6 decorative petals radiating outward -->
    <path class="ib-draw ib-petal-out" d="M200 200 C183 168 181 122 200 96 C219 122 217 168 200 200" transform="rotate(0,200,200)"/>
    <path class="ib-draw ib-petal-out" d="M200 200 C183 168 181 122 200 96 C219 122 217 168 200 200" transform="rotate(60,200,200)"/>
    <path class="ib-draw ib-petal-out" d="M200 200 C183 168 181 122 200 96 C219 122 217 168 200 200" transform="rotate(120,200,200)"/>
    <path class="ib-draw ib-petal-out" d="M200 200 C183 168 181 122 200 96 C219 122 217 168 200 200" transform="rotate(180,200,200)"/>
    <path class="ib-draw ib-petal-out" d="M200 200 C183 168 181 122 200 96 C219 122 217 168 200 200" transform="rotate(240,200,200)"/>
    <path class="ib-draw ib-petal-out" d="M200 200 C183 168 181 122 200 96 C219 122 217 168 200 200" transform="rotate(300,200,200)"/>
    <!-- Infinity path through the center -->
    <path class="ib-draw ib-infinity" d="M148 200 C148 172 168 158 200 158 C232 158 252 172 252 200 C252 228 232 242 200 242 C168 242 148 228 148 200"/>
    <circle class="ib-draw ib-ring-mid"    cx="200" cy="200" r="36"/>
    <circle class="ib-draw ib-ring-center" cx="200" cy="200" r="12"/>
    <circle class="ib-dot" cx="200" cy="138" r="3" transform="rotate(0,200,200)"/>
    <circle class="ib-dot" cx="200" cy="138" r="3" transform="rotate(60,200,200)"/>
    <circle class="ib-dot" cx="200" cy="138" r="3" transform="rotate(120,200,200)"/>
    <circle class="ib-dot" cx="200" cy="138" r="3" transform="rotate(180,200,200)"/>
    <circle class="ib-dot" cx="200" cy="138" r="3" transform="rotate(240,200,200)"/>
    <circle class="ib-dot" cx="200" cy="138" r="3" transform="rotate(300,200,200)"/>
  </svg>
  <div id="ib-text">
    <p id="ib-label">Pour toujours</p>
    <svg id="ib-line-svg" viewBox="0 0 240 18">
      <path class="ib-wavy-line" d="M6 11 Q60 3 120 11 Q180 19 234 11"/>
    </svg>
  </div>
  <div id="ib-burst"></div>
</div>

<canvas id="hearts-canvas"></canvas>
<div id="progress-line"></div>

<!-- Music pill -->
 <!-- const svgPlay = `<svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
const svgPause = `<svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`; -->

<div id="music-pill">
  <button class="pill-btn" onclick="toggleMusic()">
    <div class="pill-cover-wrap" id="pill-cover">♥</div>
    <span id="pill-icon">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </span>
    <span id="pill-label">notre chanson</span>
  </button>
</div>

<div class="container">

  <!-- S1: Accueil -->
  <div class="scene" id="s1" data-section="greeting">
    <div class="s1-hey" data-node-name="greeting">hey,</div>
    <div class="s1-name" data-node-name="name">Sally</div>
    <span class="s1-heart">♥</span>
    <div class="s1-divider"></div>
    <div class="s1-surprise" data-node-name="greetingText">Hey</div>
  </div>

  <!-- S2: Décompte -->
  <div class="scene" id="s2" data-section="ideas">
    <div class="s2-label" data-node-name="countdownLabel">ensemble depuis</div>
    <div class="s2-number-wrap">
      <div class="s2-ring"></div>
      <div class="s2-ring-2"></div>
      <div class="s2-number" id="counter-value" data-node-name="keyNumber">∞</div>
    </div>
    <div class="s2-unit" data-node-name="countdownUnit">jours</div>
    <div class="s2-since" data-node-name="countdownSince">depuis le premier jour</div>
  </div>

  <!-- S3: Photos -->
  <div class="scene" id="s3" data-section="celebration">
    <div class="s3-photos">
      <div class="photo-slot photo-slot-1" id="photo-1" data-photo="1">
        <span class="photo-placeholder-icon">♥</span>
      </div>
      <div class="photo-slot photo-slot-2">
        <img src="" id="main-photo" data-node-name="imagePath" style="display:none">
        <span class="photo-placeholder-icon" id="main-photo-placeholder">♥</span>
      </div>
      <div class="photo-slot photo-slot-3" id="photo-2" data-photo="2">
        <span class="photo-placeholder-icon">♥</span>
      </div>
    </div>
    <div class="s3-caption" data-node-name="photoCaption">Toujours aussi belle.</div>
    <div class="s3-subcaption" data-node-name="photoSub">à chaque regard</div>
  </div>

  <!-- S4: Message -->
  <div class="scene" id="s4" data-section="message">
    <!-- Bouton initial -->
    <div class="s4-btn-wrap" id="s4-btn-wrap">
      <button class="s4-reveal-btn" id="reveal-btn">
        Mes mots pour toi..
      </button>
    </div>
    <!-- Message (caché jusqu'au clic) -->
    <div class="s4-message-wrap" id="s4-msg-wrap">
      <div class="s4-ornament">— ♥ —</div>
      <div class="s4-message-scroll">
        <div class="s4-message-text" id="typed-message"></div>
      </div>
      <div class="s4-from" data-node-name="senderName">de toi qui t'aime</div>
    </div>
  </div>

  <!-- S5: Outro -->
  <div class="scene" id="s5">
    <span class="s5-heart">♥</span>
    <div class="s5-line" data-node-name="outroText">Gros Bisous !</div>
    <button id="replay" data-node-name="replayText">recommencer</button>
  </div>

</div><!-- .container -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.20.3/TweenMax.min.js"></script>
<script>
/* ── Scene transition sparkle ── */
function flashScene() {
  const el = document.getElementById('scene-flash');
  if (!el) return;
  el.classList.remove('active');
  void el.offsetWidth;
  el.classList.add('active');
}
function showAmbientLayer() {
  const a = document.getElementById('ambient-layer');
  if (a) a.style.display = 'block';
}

/* ══════════════════════════════════════
   AUDIO
══════════════════════════════════════ */
const audio = new Audio();
let isPlaying = false;
let _musicStartTime = 0;

function setAudioSrc(src) {
  if (!src || audio.src === src) return;
  audio.src = src;
  if (_musicStartTime > 0) {
    const apply = () => { audio.currentTime = _musicStartTime; audio.removeEventListener('loadedmetadata', apply); };
    audio.addEventListener('loadedmetadata', apply);
  }
}
const svgPlay = `<svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
const svgPause = `<svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;

function toggleMusic() {
  if (!audio.src || audio.src === window.location.href) return;
  if (isPlaying) {
    audio.pause(); isPlaying = false;
    document.getElementById('pill-icon').innerHTML = svgPlay;
    const ci = document.querySelector('#pill-cover img');
    if (ci) ci.classList.remove('playing');
  } else {
    audio.play().catch(() => {});
    isPlaying = true;
    document.getElementById('pill-icon').innerHTML = svgPause;
    const ci = document.querySelector('#pill-cover img');
    if (ci) ci.classList.add('playing');
  }
}
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  document.getElementById('progress-line').style.width = (audio.currentTime / audio.duration * 100) + '%';
});

/* ══════════════════════════════════════
   COUNTER — calcul depuis date
══════════════════════════════════════ */
function calcDays(dateStr) {
  if (!dateStr) return null;
  const from = new Date(dateStr);
  const now  = new Date();
  const diff = Math.floor((now - from) / (1000 * 60 * 60 * 24));
  return diff >= 0 ? diff : null;
}

/* ══════════════════════════════════════
   HEARTS CANVAS
══════════════════════════════════════ */
const hCvs = document.getElementById('hearts-canvas');
const hCtx = hCvs.getContext('2d');
let hearts = [], heartsActive = false;

function launchHearts() {
  hCvs.width = window.innerWidth; hCvs.height = window.innerHeight;
  hCvs.style.opacity = '1'; heartsActive = true; hearts = [];
  for (let i = 0; i < 30; i++) hearts.push({
    x: Math.random() * hCvs.width,
    y: hCvs.height + 20,
    sz: Math.random() * 12 + 5,
    vx: (Math.random() - 0.5) * 1.4,
    vy: -(Math.random() * 1.8 + 0.7),
    op: Math.random() * 0.5 + 0.25,
    rot: Math.random() * Math.PI * 2,
    vr: (Math.random() - 0.5) * 0.03,
  });
  animHearts();
}
function drawHeart(ctx, x, y, s, rot, op) {
  ctx.save(); ctx.translate(x, y); ctx.rotate(rot); ctx.globalAlpha = op;
  ctx.beginPath();
  ctx.moveTo(0, -7*s);
  ctx.bezierCurveTo(9*s,-17*s, 20*s,-9*s, 20*s, 0);
  ctx.bezierCurveTo(20*s, 9*s, 0, 20*s, 0, 28*s);
  ctx.bezierCurveTo(0, 20*s, -20*s, 9*s, -20*s, 0);
  ctx.bezierCurveTo(-20*s,-9*s, -9*s,-17*s, 0,-7*s);
  ctx.fillStyle = `rgba(192,57,43,${op})`;
  ctx.fill(); ctx.restore();
}
function animHearts() {
  if (!heartsActive) return;
  hCtx.clearRect(0, 0, hCvs.width, hCvs.height);
  let alive = false;
  hearts.forEach(h => {
    h.x += h.vx; h.y += h.vy; h.rot += h.vr; h.op -= 0.0025;
    if (h.y > -20 && h.op > 0) alive = true;
    if (h.op > 0) drawHeart(hCtx, h.x, h.y, h.sz / 30, h.rot, h.op);
  });
  if (alive) requestAnimationFrame(animHearts);
  else { heartsActive = false; hCvs.style.opacity = '0'; }
}

/* ══════════════════════════════════════
   TYPEWRITER
══════════════════════════════════════ */
let _fullMessage = '';
let _typeTimer = null;

function typeMessage(text, onDone) {
  const el = document.getElementById('typed-message');
  el.innerHTML = '<span class="s4-cursor"></span>';
  let i = 0;
  function tick() {
    if (i >= text.length) {
      // Remove cursor after done
      const cur = el.querySelector('.s4-cursor');
      if (cur) setTimeout(() => cur.remove(), 1200);
      if (onDone) onDone();
      return;
    }
    // Insert before cursor
    const cur = el.querySelector('.s4-cursor');
    const txt = document.createTextNode(text[i]);
    if (cur) el.insertBefore(txt, cur);
    else el.appendChild(txt);
    i++;
    // Scroll to bottom as we type
    const scroll = document.getElementById('s4-msg-wrap').querySelector('.s4-message-scroll');
    if (scroll) scroll.scrollTop = scroll.scrollHeight;
    // Vary speed for natural feel
    const delay = text[i-1] === '\n' ? 300 : text[i-1] === '.' || text[i-1] === ',' ? 80 : 28 + Math.random() * 20;
    _typeTimer = setTimeout(tick, delay);
  }
  tick();
}

/* ══════════════════════════════════════
   DATA
══════════════════════════════════════ */
function applyPhoto(slot, val) {
  const el = document.getElementById(slot);
  if (!el) return;
  el.innerHTML = '';
  const img = document.createElement('img');
  img.src = val;
  img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
  el.appendChild(img);
}

function applyField(key, val) {
  if (val == null || val === '') return;
  if (key === 'musicSrc')       { setAudioSrc(val); return; }
  if (key === 'musicStartTime') { _musicStartTime = parseFloat(val) || 0; return; }
  if (key === 'albumArt') {
    const pc = document.getElementById('pill-cover');
    if (pc) { pc.innerHTML = ''; const i = document.createElement('img'); i.src = val; pc.appendChild(i); }
    return;
  }
  if (key === 'imagePath') {
    const img = document.getElementById('main-photo');
    const ph  = document.getElementById('main-photo-placeholder');
    if (img) { img.src = val; img.style.display = 'block'; }
    if (ph)  { ph.style.display = 'none'; }
    return;
  }
  if (key === 'photo1') { applyPhoto('photo-1', val); return; }
  if (key === 'photo2') { applyPhoto('photo-2', val); return; }
  if (key === 'messageText') { _fullMessage = val; return; }
  // Countdown from date
  if (key === 'loveStartDate') {
    const days = calcDays(val);
    if (days !== null) document.getElementById('counter-value').textContent = days.toLocaleString('fr-FR');
    return;
  }
  const el = document.querySelector(`[data-node-name="${key}"]`);
  if (el) el.innerText = val;
}

/* ══════════════════════════════════════
   TIMELINE
══════════════════════════════════════ */
let tl;

function animationTimeline() {
  tl = new TimelineMax();

  tl
    // ─ Visible ─
    .to('.container', 0.01, { visibility: 'visible' })
    .add(() => showAmbientLayer())

    // ─ S1: Accueil ────────────────────────
    .from('.s1-hey',      0.8,  { opacity: 0, y: 8, ease: Power2.easeOut })
    .from('.s1-name',     1.4,  { opacity: 0, y: 20, ease: Power3.easeOut }, '-=0.2')
    .from('.s1-divider',  1.0,  { width: 0, ease: Power2.easeOut }, '-=0.6')
    .to('.s1-heart',      0.6,  { opacity: 1, scale: 1, ease: Back.easeOut.config(3) })
    .to('.s1-surprise',   1.0,  { opacity: 1, y: 0, ease: Power2.easeOut }, '-=0.2')

    .to({}, 2.8, {})

    // fade out s1
    .to('#s1', 0.8, { opacity: 0, y: -12, ease: Power2.easeIn })
    .add(() => flashScene())

    // ─ S2: Décompte ────────────────────────
    .from('#s2', 0.01, { opacity: 0 })
    .from('.s2-label',     0.8,  { opacity: 0, y: 8, ease: Power2.easeOut })
    .from('.s2-number-wrap', 1.6, { opacity: 0, scale: 0.4, ease: Expo.easeOut }, '-=0.3')
    .from('.s2-unit',      0.8,  { opacity: 0, y: 6, ease: Power2.easeOut }, '-=0.3')
    .to('.s2-since',       1.0,  { opacity: 1, y: 0, ease: Power2.easeOut })
    .add(() => launchHearts())

    // music pill
    .add(() => {
      document.getElementById('music-pill').style.display = 'block';
      TweenMax.from('#music-pill', 0.8, { opacity: 0, x: 40, ease: Power2.easeOut });
      document.getElementById('progress-line').style.opacity = '1';
    }, '-=0.5')

    .to({}, 3.2, {})
    .to('#s2', 0.8, { opacity: 0, y: -12, ease: Power2.easeIn })
    .add(() => flashScene())

    // ─ S3: Photos ──────────────────────────
    .from('#s3', 0.01, { opacity: 0 })
    .from('.photo-slot-2', 0.8, { opacity: 0, scale: 0.85, y: 20, ease: Back.easeOut.config(1.5) })
    .from('.photo-slot-1', 0.7, { opacity: 0, x: -30, rotate: -12, ease: Back.easeOut.config(1.5) }, '-=0.3')
    .from('.photo-slot-3', 0.7, { opacity: 0, x: 30,  rotate: 10,  ease: Back.easeOut.config(1.5) }, '-=0.5')
    .from('.s3-caption',   0.8, { opacity: 0, y: 12, ease: Power2.easeOut }, '-=0.2')
    .from('.s3-subcaption',0.7, { opacity: 0, y: 8,  ease: Power2.easeOut }, '-=0.3')
    .add(() => launchHearts(), '-=0.2')

    .to({}, 3.5, {})
    .to('#s3', 0.8, { opacity: 0, y: -12, ease: Power2.easeIn })
    .add(() => flashScene())

    // ─ S4: Message ─────────────────────────
    .from('#s4', 0.01, { opacity: 0 })
    .add(() => document.getElementById('s4').classList.add('clickable'))
    .from('#s4-btn-wrap', 1.0, { opacity: 0, y: 12, ease: Power2.easeOut })

    // Message se dévoile au clic sur le bouton
    // (handled in JS below, TL pauses here)
    .add(function() {
      tl.pause();
      document.getElementById('reveal-btn').addEventListener('click', function revealOnce() {
        this.removeEventListener('click', revealOnce);
        // Swap btn → message
        document.getElementById('s4-btn-wrap').style.display = 'none';
        const msgWrap = document.getElementById('s4-msg-wrap');
        msgWrap.classList.add('visible');
        TweenMax.from(msgWrap, 0.5, { opacity: 0, y: 10, ease: Power2.easeOut });

        // Type the message
        const msg = _fullMessage || 'Je t\'aime infiniment.';
        typeMessage(msg, () => {
          // After typing — resume TL after a pause
          setTimeout(() => tl.resume(), 3500);
        });
      });
    })

    .to({}, 0.5, {})
    .to('#s4', 1.0, { opacity: 0, y: -12, ease: Power2.easeIn })
    .add(() => flashScene())

    // ─ S5: Outro ───────────────────────────
    .from('#s5', 0.01, { opacity: 0 })
    .add(() => document.getElementById('s5').classList.add('clickable'))
    .from('.s5-heart',   0.8, { opacity: 0, scale: 0, ease: Back.easeOut.config(3) })
    .from('.s5-line',    0.8, { opacity: 0, y: 10, ease: Power2.easeOut }, '-=0.2')
    .from('#replay',     0.6, { opacity: 0, ease: Power2.easeOut }, '-=0.1');

  // Replay
  document.getElementById('replay').addEventListener('click', () => {
    if (_typeTimer) { clearTimeout(_typeTimer); _typeTimer = null; }
    document.getElementById('s4').classList.remove('clickable');
    document.getElementById('s5').classList.remove('clickable');
    // Reset message section
    document.getElementById('s4-btn-wrap').style.display = '';
    const msgWrap = document.getElementById('s4-msg-wrap');
    msgWrap.classList.remove('visible');
    document.getElementById('typed-message').innerHTML = '';

    // Reset opacities
    ['#s1','#s2','#s3','#s4','#s5'].forEach(id => TweenMax.set(id, { opacity: 1, y: 0 }));

    if (window.wwEngine) window.wwEngine.applyDecorations(window.__WW_DECO__ || []);
    tl.restart();
  });
}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
function fetchData() {
  const run = (data) => {
    Object.keys(data).forEach(k => { if (data[k] != null && data[k] !== '') applyField(k, data[k]); });
    animationTimeline();
  };
  if (window.__WW_DATA__) run(window.__WW_DATA__);
  else animationTimeline();
}

/* ══════════════════════════════════════
   WW_UPDATE (live editor)
══════════════════════════════════════ */
window.addEventListener('message', (e) => {
  if (!e.data || e.data.type !== 'WW_UPDATE') return;
  const { data, style } = e.data;
  if (style) {
    const r = document.documentElement;
    if (style.primaryColor) r.style.setProperty('--primary',    style.primaryColor);
    if (style.accentColor)  r.style.setProperty('--accent',     style.accentColor);
    if (style.fontFamily)   { r.style.setProperty('--font', `'${style.fontFamily}', Georgia, serif`); }
    if (style.textColor)    r.style.setProperty('--text-color', style.textColor);
    if (style.textMuted)    r.style.setProperty('--text-muted', style.textMuted);
    if (style.fontSize) {
      const sc = style.fontSize === 'small' ? '0.85' : style.fontSize === 'large' ? '1.15' : '1';
      r.style.setProperty('--fs-scale', sc);
    }
  }
  if (data) {
    const { photoTransforms: _pt, ...fields } = data;
    Object.keys(fields).forEach(k => applyField(k, fields[k]));
  }
});

function runIntro() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) { fetchData(); return; }
  const overlay=document.getElementById('intro-overlay'), drawEls=Array.from(overlay.querySelectorAll('.ib-draw'));
  const introTxt=document.getElementById('ib-text'), linePath=overlay.querySelector('.ib-wavy-line'), burst=document.getElementById('ib-burst');
  const STEP=55, DUR={'ib-ring-left':600,'ib-ring-right':600,'ib-petal-out':420,'ib-infinity':700,'ib-ring-mid':480,'ib-ring-center':360};
  drawEls.forEach((el,i)=>{
    const len=Math.ceil(el.getTotalLength?el.getTotalLength():400);
    el.style.strokeDasharray=len; el.style.strokeDashoffset=len;
    const dur=Object.entries(DUR).reduce((d,[c,v])=>el.classList.contains(c)?v:d,400);
    setTimeout(()=>{ el.style.transition=`stroke-dashoffset ${dur}ms cubic-bezier(0.25,1,0.5,1)`; el.style.strokeDashoffset='0'; },80+i*STEP);
  });
  const drawDone=80+drawEls.length*STEP+700;
  setTimeout(()=>{ introTxt.classList.add('show'); setTimeout(()=>linePath.classList.add('drawn'),130); },drawDone-380);
  const PETALS=['❤️','💑','❤️','🌹','❤️','💑','❤️','🌹','❤️','💑','❤️','🌹'];
  setTimeout(()=>{
    PETALS.forEach((p,i)=>{ const angle=(i/PETALS.length)*360,rad=angle*Math.PI/180,dist=88+Math.random()*92;
      const fp=document.createElement('div'); fp.className='ib-fp'; fp.textContent=p;
      fp.style.cssText=`--ib-tx:${(Math.cos(rad)*dist).toFixed(1)}px;--ib-ty:${(Math.sin(rad)*dist).toFixed(1)}px;--ib-tr:${(Math.random()*360-180).toFixed(0)}deg;animation-delay:${i*32}ms`;
      burst.appendChild(fp);
    });
  },drawDone+120);
  setTimeout(()=>{ overlay.classList.add('ib-dissolve'); setTimeout(()=>{ overlay.style.display='none'; fetchData(); },960); },drawDone+1080);
}

document.addEventListener('DOMContentLoaded', runIntro);
</script>
</body>
</html>

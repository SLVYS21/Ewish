*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ГўвЂќв‚¬ГўвЂќв‚¬ Surfaces (refined: calmer, more white space) ГўвЂќв‚¬ГўвЂќв‚¬ */
  --mk-cream:    #FBF7F3;
  --mk-cream-2:  #F6EFEA;
  --mk-blush:    #FFF4F6;
  --mk-lilac-bg: #F6F1FB;
  --mk-paper:    #FFFFFF;

  /* ГўвЂќв‚¬ГўвЂќв‚¬ Brand ГўвЂќв‚¬ГўвЂќв‚¬ */
  --mk-rose:      #E11D48;
  --mk-rose-2:    #F35C7A;
  --mk-rose-soft: #FFB3C1;
  --mk-rose-pale: #FFE3E8;

  /* ГўвЂќв‚¬ГўвЂќв‚¬ Type-system accents (these TEACH the concept) ГўвЂќв‚¬ГўвЂќв‚¬ */
  --mk-voeu:      #E11D48;   /* VГ…вЂњu animГ©  = rose   */
  --mk-voeu-bg:   #FFF4F6;
  --mk-voeu-soft: #FFD2DB;
  --mk-mur:       #8A63D2;   /* Mur de vГ…вЂњux = violet */
  --mk-mur-bg:    #F4EFFB;
  --mk-mur-soft:  #DBCBF2;
  --mk-mixte-a:   #E11D48;   /* Mixte = blend roseГўвЂ вЂ™violet */
  --mk-mixte-b:   #8A63D2;

  /* ГўвЂќв‚¬ГўвЂќв‚¬ Secondary accents ГўвЂќв‚¬ГўвЂќв‚¬ */
  --mk-mint:        #3FA98A;
  --mk-mint-soft:   #C9EEDF;
  --mk-butter:      #E5A93B;
  --mk-butter-soft: #FBE8C6;
  --mk-peach:       #FF9F7A;

  /* ГўвЂќв‚¬ГўвЂќв‚¬ Ink ГўвЂќв‚¬ГўвЂќв‚¬ */
  --mk-ink:   #271826;
  --mk-ink-2: #5E4F60;
  --mk-ink-3: #978799;
  --mk-ink-4: #C4B8C5;

  /* ГўвЂќв‚¬ГўвЂќв‚¬ Lines ГўвЂќв‚¬ГўвЂќв‚¬ */
  --mk-line:        #EFE6EC;
  --mk-line-2:      #E5D7DF;
  --mk-line-strong: #D8C6D0;

  /* ГўвЂќв‚¬ГўвЂќв‚¬ Radii ГўвЂќв‚¬ГўвЂќв‚¬ */
  --mk-r-xs:   10px;
  --mk-r-sm:   14px;
  --mk-r-md:   20px;
  --mk-r-lg:   26px;
  --mk-r-xl:   34px;
  --mk-r-pill: 999px;

  /* ГўвЂќв‚¬ГўвЂќв‚¬ Shadows (softer, more mature) ГўвЂќв‚¬ГўвЂќв‚¬ */
  --mk-sh-1: 0 1px 2px rgba(39,24,38,.04), 0 2px 8px rgba(39,24,38,.03);
  --mk-sh-2: 0 2px 6px rgba(39,24,38,.05), 0 12px 28px rgba(39,24,38,.06);
  --mk-sh-3: 0 8px 20px rgba(39,24,38,.08), 0 24px 60px rgba(39,24,38,.10);
  --mk-sh-rose:  0 10px 28px rgba(225,29,72,.20);
  --mk-sh-mur:   0 10px 28px rgba(138,99,210,.24);

  /* ГўвЂќв‚¬ГўвЂќв‚¬ Type ГўвЂќв‚¬ГўвЂќв‚¬ */
  --mk-display: 'Instrument Serif', Georgia, serif;
  --mk-body:    'Plus Jakarta Sans', system-ui, sans-serif;
  --mk-hand:    'Caveat', cursive;
}

html, body { height: 100%; }
body {
  font-family: var(--mk-body);
  background: #ECE4E8;
  color: var(--mk-ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font-family: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--mk-line-2); border-radius: 99px; }

/* ГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђ thank-you screen ГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђ */
.thanks { position: absolute; inset: 0; z-index: 60; background: linear-gradient(180deg,#FBF1F4,#F1EAFB); display: flex; flex-direction: column; align-items: center; text-align: center; padding: 60px 26px 30px; overflow-y: auto; }
.thanks .hero-anim { width: 116px; height: 116px; animation: mk-pop .5s both; }
.thanks h2 { font-family: var(--mk-display); font-size: 38px; line-height: 1; margin-top: 8px; animation: mk-up .5s .1s both; }
.thanks p { font-size: 14.5px; color: var(--mk-ink-2); margin-top: 12px; line-height: 1.5; max-width: 300px; animation: mk-up .5s .18s both; }
.thanks .choices { width: 100%; margin-top: auto; padding-top: 26px; animation: mk-up .5s .26s both; }
.choice { display: flex; align-items: center; gap: 14px; width: 100%; text-align: left; background: #fff; border-radius: 18px; padding: 15px; margin-bottom: 11px; box-shadow: var(--mk-sh-1); }
.choice:active { transform: scale(.98); }
.choice .ic { width: 46px; height: 46px; border-radius: 13px; display: grid; place-items: center; flex-shrink: 0; overflow: hidden; }
.choice .ic img { width: 40px; height: 40px; }
.choice .ct { flex: 1; }
.choice .ct b { display: block; font-size: 15px; font-weight: 800; }
.choice .ct span { font-size: 12.5px; color: var(--mk-ink-3); }

/* ГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђ RECIPIENT    intro ГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђ */
.intro { position: absolute; inset: 0; z-index: 70; background: radial-gradient(120% 90% at 50% 20%,#3A2440,#160E1A 75%); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
.intro .glow { position: absolute; border-radius: 50%; filter: blur(50px); opacity: .55; }
.intro .brand { font-size: 12px; font-weight: 800; letter-spacing: .22em; text-transform: uppercase; opacity: .7; animation: mk-fade 1s both; }
.intro .big { font-family: var(--mk-display); font-size: 46px; line-height: 1.02; text-align: center; margin-top: 14px; padding: 0 30px; animation: mk-up 1s .3s both; }
.intro .big em { font-style: italic; background: linear-gradient(120deg,#FFC6D4,#C9A8EC); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.intro .from { font-size: 14px; opacity: .8; margin-top: 20px; animation: mk-fade 1s .9s both; }
.intro-anim { width: 96px; height: 96px; margin-bottom: 6px; animation: mk-float 3s ease-in-out infinite, mk-pop .6s both; }
.skip { position: absolute; top: 46px; right: 20px; z-index: 4; display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; font-weight: 800; color: rgba(255,255,255,.85); background: rgba(255,255,255,.14); padding: 8px 14px; border-radius: 99px; backdrop-filter: blur(6px); }
.intro .prog { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 120px; height: 4px; border-radius: 99px; background: rgba(255,255,255,.2); overflow: hidden; }
.intro .prog i { display: block; height: 100%; background: #fff; border-radius: 99px; animation: introbar 4s linear forwards; }
@keyframes introbar { from { width: 0; } to { width: 100%; } }

/* recipient    envelope card */
.env { position: absolute; inset: 0; z-index: 70; background: radial-gradient(120% 90% at 50% 25%,#3A2440,#160E1A 75%); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
.env .card {
  background: linear-gradient(160deg,#fff,#FBEFF3); color: var(--mk-ink); border-radius: 28px;
  padding: 34px 26px; text-align: center; width: 100%; max-width: 320px;
  box-shadow: 0 30px 70px rgba(0,0,0,.5); animation: mk-pop .5s both;
}
.env .card .seal { width: 92px; height: 92px; margin: 0 auto 6px; }
.env .card h3 { font-family: var(--mk-display); font-size: 30px; line-height: 1.05; }
.env .card p { font-size: 13.5px; color: var(--mk-ink-2); margin-top: 8px; }
.env .open-btn { margin-top: 22px; width: 100%; padding: 16px; border-radius: 16px; font-size: 16px; font-weight: 800; color: #fff; background: linear-gradient(120deg,var(--mk-rose),var(--mk-mur)); box-shadow: 0 12px 30px rgba(180,60,120,.4); display: inline-flex; align-items: center; justify-content: center; gap: 9px; }
.env .open-btn:active { transform: scale(.97); }
.env .tap-hint { font-size: 12px; opacity: .6; margin-top: 16px; }

/* falling cascade layer */
.cascade { position: absolute; inset: 0; z-index: 45; pointer-events: none; overflow: hidden; }
.cascade span { position: absolute; top: -60px; will-change: transform; }
.cascade span img { display: block; }
@keyframes fall { to { transform: translateY(115vh) rotate(var(--r)); } }

/* confetti bits */
.confetti-bit { position: absolute; top: -20px; width: 10px; height: 14px; border-radius: 2px; opacity: .95; }
@keyframes fall2 { to { transform: translateY(120vh) rotate(720deg); } }

/* ГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђ STORY VIEWER (tap a wish) ГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђ */
.story { position: absolute; inset: 0; z-index: 80; background: #120A16; overflow: hidden; }
.story-track { display: flex; height: 100%; transition: transform .4s cubic-bezier(.2,.85,.25,1); }
.story-slide { flex: 0 0 100%; height: 100%; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 74px 26px 96px; }
.story-slide .bgblur { position: absolute; inset: 0; opacity: .5; filter: blur(30px); }
.story-card {
  position: relative; z-index: 2; width: 100%; border-radius: 26px; padding: 26px 24px;
  box-shadow: 0 30px 70px rgba(0,0,0,.5); animation: mk-pop .4s both; text-align: left;
}
.story-card .who { display: flex; align-items: center; gap: 11px; }
.story-card .who .av { width: 44px; height: 44px; font-size: 15px; }
.story-card .who b { font-size: 17px; font-weight: 800; }
.story-card .who .rel { font-size: 12px; opacity: .6; }
.story-card .big-tx { font-family: var(--mk-display); font-size: 27px; line-height: 1.25; margin-top: 18px; }
.story-card .s-media { margin-top: 18px; border-radius: 16px; overflow: hidden; }
.story-card .s-photo { height: 150px; display: grid; place-items: center; font-size: 44px; }
.story-card .s-gif { display: grid; place-items: center; padding: 10px; background: rgba(255,255,255,.5); border-radius: 16px; }
.story-card .s-gif img { width: 120px; height: 120px; }
.story-card .s-audio { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,.5); border-radius: 14px; padding: 12px; }
.story-card .s-audio .pb { width: 42px; height: 42px; border-radius: 50%; background: var(--mk-rose); color: #fff; display: grid; place-items: center; flex-shrink: 0; }
/* progress dashes */
.story-bars { position: absolute; top: 48px; left: 16px; right: 16px; z-index: 6; display: flex; gap: 5px; }
.story-bars i { flex: 1; height: 3px; border-radius: 99px; background: rgba(255,255,255,.28); overflow: hidden; }
.story-bars i b { display: block; height: 100%; width: 0; background: #fff; border-radius: 99px; }
.story-bars i.done b { width: 100%; }
.story-bars i.active b { animation: sbar 6s linear forwards; }
@keyframes sbar { to { width: 100%; } }
.story-x { position: absolute; top: 42px; right: 16px; z-index: 8; width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,.18); backdrop-filter: blur(6px); display: grid; place-items: center; color: #fff; }
.story-x:active { transform: scale(.9); }
.story-hint { position: absolute; bottom: 34px; left: 0; right: 0; z-index: 6; text-align: center; color: rgba(255,255,255,.75); font-size: 12.5px; font-weight: 700; }
.story-count { position: absolute; top: 44px; left: 16px; z-index: 8; font-size: 12px; font-weight: 800; color: rgba(255,255,255,.85); }
/* invisible tap zones */
.tap-l, .tap-r { position: absolute; top: 0; bottom: 90px; width: 34%; z-index: 5; }
.tap-l { left: 0; } .tap-r { right: 0; }

/* toast */
.toast { position: absolute; bottom: 96px; left: 50%; transform: translateX(-50%); z-index: 90; background: var(--mk-ink); color: #fff; font-size: 13px; font-weight: 700; padding: 11px 18px; border-radius: 99px; box-shadow: var(--mk-sh-3); display: flex; align-items: center; gap: 8px; animation: mk-up .3s both; white-space: nowrap; }

/* highlight ring when a wish is tapped in overview */
@keyframes ring { 0%{ box-shadow: 0 0 0 0 rgba(138,99,210,.5);} 100%{ box-shadow: 0 0 0 14px rgba(138,99,210,0);} }

   ГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђ */
.intro-inner { position: relative; z-index: 3; display: flex; flex-direction: column; align-items: center; }

/* ГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђ
   GIFT UNWRAP    the tap-to-open present
   ГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђ */
.gift-scene {
  position: absolute; inset: 0; z-index: 70;
  background: radial-gradient(120% 90% at 50% 22%,#3A2440,#160E1A 75%);
  color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 30px; overflow: hidden; text-align: center;
}
.gift-scene .glow { position: absolute; border-radius: 50%; filter: blur(55px); opacity: .5; }
.gift-scene .brand { position: absolute; top: 48px; font-size: 12px; font-weight: 800; letter-spacing: .22em; text-transform: uppercase; z-index: 3; }
.gift-box {
  position: relative; width: 240px; height: 240px; display: grid; place-items: center;
  margin-bottom: 8px; z-index: 3; animation: giftShake 2.6s ease-in-out infinite;
}
.gift-box:active { transform: scale(.95); }
.gift-anim { width: 200px; height: 200px; filter: drop-shadow(0 22px 40px rgba(0,0,0,.5)); position: relative; z-index: 2; }
.gift-ring { position: absolute; inset: 26px; border-radius: 50%; border: 2px solid rgba(255,255,255,.28); animation: giftPulse 2.2s ease-out infinite; }
.gift-ring.r2 { animation-delay: 1.1s; }
.gift-spark { position: absolute; font-size: 26px; z-index: 3; animation: sparkTwinkle 1.8s ease-in-out infinite; }
.gift-spark.s1 { top: 12%; right: 16%; }
.gift-spark.s2 { bottom: 20%; left: 12%; animation-delay: .9s; }
.gift-title { font-family: var(--mk-display); font-size: 30px; line-height: 1.08; margin-top: 6px; z-index: 3; }
.gift-scene .open-btn { margin-top: 24px; width: min(320px,88%); padding: 16px; border-radius: 16px; font-size: 16px; font-weight: 800; color: #fff; background: linear-gradient(120deg,var(--mk-rose),var(--mk-mur)); box-shadow: 0 14px 34px rgba(180,60,120,.45); display: inline-flex; align-items: center; justify-content: center; gap: 9px; z-index: 3; }
.gift-scene .open-btn:active { transform: scale(.97); }
.gift-scene .tap-hint { font-size: 12.5px; opacity: .6; margin-top: 16px; z-index: 3; }
.gift-scene.pop .gift-box { animation: giftBurst .7s cubic-bezier(.2,.8,.2,1) forwards; }
.gift-scene.pop::after { content:''; position:absolute; inset:0; background:#fff; z-index:5; animation: giftFlash .7s ease-out forwards; pointer-events:none; }
@keyframes giftShake { 0%,88%,100%{ transform: rotate(0) translateY(0);} 90%{ transform: rotate(-5deg);} 93%{ transform: rotate(5deg);} 96%{ transform: rotate(-3deg);} }
@keyframes giftPulse { 0%{ transform: scale(.8); opacity:.7;} 100%{ transform: scale(1.5); opacity:0;} }
@keyframes sparkTwinkle { 0%,100%{ transform: scale(.7); opacity:.4;} 50%{ transform: scale(1.15); opacity:1;} }
@keyframes giftBurst { 0%{ transform: scale(1);} 40%{ transform: scale(1.18) rotate(-4deg);} 100%{ transform: scale(2.4) rotate(6deg); opacity:0;} }
@keyframes giftFlash { 0%{ opacity:0;} 55%{ opacity:.9;} 100%{ opacity:0;} }

.claim-x { position: absolute; top: 16px; right: 16px; z-index: 4; width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,.16); display: grid; place-items: center; color: currentColor; }
.claim-panel.form .claim-x, .claim-panel.done .claim-x { background: var(--mk-cream-2); }
.claim-x:active { transform: scale(.92); }
.claim-back { position: absolute; top: 16px; left: 16px; z-index: 4; width: 34px; height: 34px; border-radius: 50%; background: var(--mk-cream-2); display: grid; place-items: center; color: var(--mk-ink-2); }
.claim-hero-anim { width: 92px; height: 92px; margin: 6px auto 0; position: relative; z-index: 2; animation: mk-pop .5s both; }
.claim-kicker { position: relative; z-index: 2; font-size: 13px; font-weight: 800; letter-spacing: .04em; opacity: .82; margin-top: 12px; }
.claim-amount { position: relative; z-index: 2; font-family: var(--mk-display); font-size: 60px; line-height: 1; margin-top: 6px; }
.claim-amount small { font-size: 20px; font-weight: 400; opacity: .7; }
.claim-sub { position: relative; z-index: 2; font-size: 13.5px; line-height: 1.55; opacity: .88; margin-top: 14px; max-width: 320px; }
.claim-sub b { font-weight: 800; }
.claim-cta { position: relative; z-index: 2; margin-top: 22px; }
.claim-reassure { position: relative; z-index: 2; display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; opacity: .7; margin-top: 14px; font-weight: 600; }
/* form step */
.claim-steps { display: flex; gap: 6px; margin-bottom: 16px; }
.claim-steps i { width: 26px; height: 4px; border-radius: 99px; background: var(--mk-line-2); }
.claim-steps i.on { background: var(--mk-mur); }
.claim-h { font-family: var(--mk-display); font-size: 27px; line-height: 1.1; }
.claim-h b { font-style: normal; color: var(--mk-mur); }
.claim-p { font-size: 13.5px; color: var(--mk-ink-2); margin-top: 8px; line-height: 1.5; }
.momo-row { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.momo { display: flex; align-items: center; gap: 8px; padding: 13px 12px; border-radius: 13px; background: var(--mk-cream); border: 1.5px solid var(--mk-line); font-size: 13px; font-weight: 800; color: var(--mk-ink-2); }
.momo .momo-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.momo.on { border-color: var(--mc); background: #fff; color: var(--mk-ink); box-shadow: 0 4px 14px rgba(0,0,0,.06); }
.claim-fine { font-size: 11px; color: var(--mk-ink-3); text-align: center; margin-top: 12px; font-weight: 600; }
/* done step */
.claim-done-h { font-family: var(--mk-display); font-size: 40px; line-height: 1; margin-top: 8px; }
.claim-done-card { width: 100%; max-width: 320px; margin: 20px auto 0; background: #fff; border-radius: 18px; padding: 6px 16px; box-shadow: var(--mk-sh-1); }
.cd-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 0; font-size: 13.5px; font-weight: 700; border-bottom: 1px solid var(--mk-line); }
.cd-row:last-child { border-bottom: none; }
.claim-panel.done .btn-pri, .claim-panel.done .btn-ghost { max-width: 320px; }

.story-arrow {
  display: none; position: absolute; top: 50%; transform: translateY(-50%); z-index: 7;
